<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920">
  <rect width="1600" height="920" fill="#101214"/>
  <defs>
    <style>
      .device { fill: #96bfcd; stroke: #c9e7f0; stroke-width: 2; }
      .host { fill: #d6e8bc; stroke: #f3ffd9; stroke-width: 2; }
      .link { stroke: #72b7dd; stroke-width: 5; stroke-linecap: round; }
      .access { stroke: #79d18b; stroke-width: 5; stroke-linecap: round; }
      .overlay { stroke: #f5c542; stroke-width: 3; stroke-dasharray: 12 12; fill: none; opacity: .95; }
      .label { fill: #f2f8fb; font: 700 24px Arial, sans-serif; text-anchor: middle; }
      .small { fill: #f2f8fb; font: 700 18px Arial, sans-serif; text-anchor: middle; }
      .ip { fill: #f28c18; font: 700 22px Arial, sans-serif; text-anchor: middle; }
      .net { fill: #7cc8f2; font: 700 18px Arial, sans-serif; text-anchor: middle; }
      .vni { fill: #f5c542; font: 700 24px Arial, sans-serif; text-anchor: middle; }
      .client { fill: #1d1f21; font: 700 18px Arial, sans-serif; text-anchor: middle; }
    </style>
  </defs>

  <text x="800" y="42" class="vni">Lab05 VXLAN EVPN L2: Zone 1, VLAN 10, VNI 10010</text>

  <line x1="500" y1="180" x2="170" y2="610" class="link"/>
  <line x1="500" y1="180" x2="800" y2="610" class="link"/>
  <line x1="500" y1="180" x2="1370" y2="610" class="link"/>
  <line x1="1100" y1="180" x2="170" y2="610" class="link"/>
  <line x1="1100" y1="180" x2="800" y2="610" class="link"/>
  <line x1="1100" y1="180" x2="1370" y2="610" class="link"/>

  <path d="M 170 610 C 350 420, 1250 420, 1370 610" class="overlay"/>
  <path d="M 170 610 C 500 360, 900 360, 800 610" class="overlay"/>
  <path d="M 800 610 C 960 360, 1250 380, 1370 610" class="overlay"/>

  <rect x="440" y="100" width="120" height="120" class="device"/>
  <text x="500" y="168" class="label">spine-1</text>
  <text x="500" y="82" class="ip">Lo0 172.16.1.1</text>

  <rect x="1040" y="100" width="120" height="120" class="device"/>
  <text x="1100" y="168" class="label">spine-2</text>
  <text x="1100" y="82" class="ip">Lo0 172.16.1.2</text>

  <rect x="110" y="585" width="120" height="120" class="device"/>
  <text x="170" y="653" class="label">leaf-1</text>
  <text x="170" y="740" class="ip">Lo0 172.16.10.1</text>

  <rect x="740" y="585" width="120" height="120" class="device"/>
  <text x="800" y="653" class="label">leaf-2</text>
  <text x="800" y="740" class="ip">Lo0 172.16.10.2</text>

  <rect x="1310" y="585" width="120" height="120" class="device"/>
  <text x="1370" y="653" class="label">leaf-3</text>
  <text x="1370" y="740" class="ip">Lo0 172.16.10.3</text>

  <line x1="170" y1="705" x2="170" y2="805" class="access"/>
  <line x1="800" y1="705" x2="800" y2="805" class="access"/>
  <line x1="1370" y1="705" x2="1370" y2="805" class="access"/>

  <rect x="90" y="805" width="160" height="78" rx="8" class="host"/>
  <text x="170" y="835" class="client">client-1</text>
  <text x="170" y="861" class="client">192.168.10.11</text>

  <rect x="720" y="805" width="160" height="78" rx="8" class="host"/>
  <text x="800" y="835" class="client">client-2</text>
  <text x="800" y="861" class="client">192.168.10.12</text>

  <rect x="1290" y="805" width="160" height="78" rx="8" class="host"/>
  <text x="1370" y="835" class="client">client-3</text>
  <text x="1370" y="861" class="client">192.168.10.13</text>

  <text x="335" y="416" class="net">10.1.1.0/31</text>
  <text x="640" y="416" class="net">10.1.2.0/31</text>
  <text x="930" y="416" class="net">10.1.3.0/31</text>
  <text x="465" y="500" class="net">10.2.1.0/31</text>
  <text x="980" y="500" class="net">10.2.2.0/31</text>
  <text x="1240" y="416" class="net">10.2.3.0/31</text>

  <text x="170" y="780" class="small">Eth3 access VLAN10</text>
  <text x="800" y="780" class="small">Eth3 access VLAN10</text>
  <text x="1370" y="780" class="small">Eth3 access VLAN10 only one client</text>
  <text x="800" y="330" class="vni">EVPN overlay over loopbacks, ingress replication</text>
</svg>
