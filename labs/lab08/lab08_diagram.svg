<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920">
  <defs>
    <style>
      .bg { fill: #101214; }
      .device { fill: #96bfcd; stroke: #c9e7f0; stroke-width: 2; }
      .border { fill: #e5a65b; stroke: #ffd29a; stroke-width: 2; }
      .host-blue { fill: #8dc8ed; stroke: #d7f1ff; stroke-width: 2; }
      .host-red { fill: #e99595; stroke: #ffd7d7; stroke-width: 2; }
      .link { stroke: #72b7dd; stroke-width: 5; stroke-linecap: round; }
      .external { stroke: #f28c18; stroke-width: 6; stroke-linecap: round; }
      .access-blue { stroke: #7cc8f2; stroke-width: 6; stroke-linecap: round; }
      .access-red { stroke: #e87878; stroke-width: 6; stroke-linecap: round; }
      .overlay { stroke: #f5c542; stroke-width: 3; stroke-dasharray: 12 12; fill: none; opacity: .95; }
      .legend-box { fill: #171b1f; stroke: #38434d; stroke-width: 2; rx: 8; }
      .title { fill: #f5c542; font: 700 26px Arial, sans-serif; text-anchor: middle; }
      .label { fill: #f2f8fb; font: 700 23px Arial, sans-serif; text-anchor: middle; }
      .host-label { fill: #1d1f21; font: 700 17px Arial, sans-serif; text-anchor: middle; }
      .legend-title { fill: #f5c542; font: 700 21px Arial, sans-serif; }
      .legend-text { fill: #f2f8fb; font: 700 16px Arial, sans-serif; }
      .legend-muted { fill: #a8b3bd; font: 700 15px Arial, sans-serif; }
      .blue-text { fill: #7cc8f2; font: 700 16px Arial, sans-serif; }
      .red-text { fill: #e99595; font: 700 16px Arial, sans-serif; }
      .orange-text { fill: #f28c18; font: 700 16px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="920"/>
  <text class="title" x="800" y="48">Lab08 VXLAN Routing: EVPN Route-Type 5 Summaries</text>

  <line x1="330" y1="170" x2="150" y2="500" class="link"/>
  <line x1="330" y1="170" x2="455" y2="500" class="link"/>
  <line x1="330" y1="170" x2="760" y2="500" class="link"/>
  <line x1="750" y1="170" x2="150" y2="500" class="link"/>
  <line x1="750" y1="170" x2="455" y2="500" class="link"/>
  <line x1="750" y1="170" x2="760" y2="500" class="link"/>

  <path d="M 150 500 C 300 350, 610 350, 760 500" class="overlay"/>
  <path d="M 455 500 C 560 410, 660 410, 760 500" class="overlay"/>

  <rect x="270" y="100" width="120" height="120" class="device"/>
  <text x="330" y="168" class="label">spine-1</text>

  <rect x="690" y="100" width="120" height="120" class="device"/>
  <text x="750" y="168" class="label">spine-2</text>

  <rect x="90" y="475" width="120" height="120" class="device"/>
  <text x="150" y="543" class="label">leaf-1</text>

  <rect x="395" y="475" width="120" height="120" class="device"/>
  <text x="455" y="543" class="label">leaf-2</text>

  <rect x="700" y="475" width="120" height="120" class="device"/>
  <text x="760" y="543" class="label">leaf-3</text>

  <line x1="150" y1="595" x2="150" y2="735" class="access-blue"/>
  <line x1="455" y1="595" x2="455" y2="735" class="access-red"/>

  <rect x="70" y="735" width="160" height="78" rx="8" class="host-blue"/>
  <text x="150" y="767" class="host-label">client-blue</text>
  <text x="150" y="792" class="host-label">10.10.10.11</text>

  <rect x="375" y="735" width="160" height="78" rx="8" class="host-red"/>
  <text x="455" y="767" class="host-label">client-red</text>
  <text x="455" y="792" class="host-label">10.20.20.12</text>

  <line x1="735" y1="595" x2="690" y2="735" class="external"/>
  <line x1="785" y1="595" x2="830" y2="735" class="external"/>
  <rect x="680" y="735" width="160" height="78" rx="8" class="border"/>
  <text x="760" y="767" class="host-label">border-1</text>
  <text x="760" y="792" class="host-label">AS 65300</text>

  <rect x="950" y="100" width="570" height="720" class="legend-box"/>
  <text x="990" y="145" class="legend-title">Legend</text>

  <text x="990" y="190" class="blue-text">VRF BLUE</text>
  <text x="990" y="218" class="legend-muted">VLAN10 / L2VNI 10010 / L3VNI 10100</text>
  <text x="990" y="243" class="legend-muted">Client prefix 10.10.10.0/24</text>
  <text x="990" y="268" class="legend-muted">Summary 10.10.0.0/16</text>

  <text x="990" y="320" class="red-text">VRF RED</text>
  <text x="990" y="348" class="legend-muted">VLAN20 / L2VNI 10020 / L3VNI 10200</text>
  <text x="990" y="373" class="legend-muted">Client prefix 10.20.20.0/24</text>
  <text x="990" y="398" class="legend-muted">Summary 10.20.0.0/16</text>

  <text x="990" y="450" class="orange-text">External Routing</text>
  <text x="990" y="478" class="legend-muted">leaf-3 BLUE: 172.31.10.1/30</text>
  <text x="990" y="503" class="legend-muted">border-1 BLUE: 172.31.10.2/30</text>
  <text x="990" y="528" class="legend-muted">leaf-3 RED: 172.31.20.1/30</text>
  <text x="990" y="553" class="legend-muted">border-1 RED: 172.31.20.2/30</text>

  <text x="990" y="605" class="legend-title">Route Flow</text>
  <text x="990" y="635" class="legend-text">1. Client /24 is advertised as EVPN Type-5</text>
  <text x="990" y="662" class="legend-text">2. leaf-3 creates /16 aggregate</text>
  <text x="990" y="689" class="legend-text">3. border-1 routes between VRFs</text>
  <text x="990" y="716" class="legend-text">4. leaf-3 re-advertises summary as Type-5</text>

  <text x="990" y="770" class="legend-muted">Underlay: eBGP over IPv6 link-local</text>
  <text x="990" y="795" class="legend-muted">Overlay: iBGP EVPN, ASN 65000</text>
</svg>
