hostname spine-2
!
ip routing
interface Loopback0
   ip address 172.16.1.2/32
!
interface Ethernet1
   description to-leaf-1
   no switchport
   ip address 10.2.1.0/31
   no shutdown
!
interface Ethernet2
   description to-leaf-2
   no switchport
   ip address 10.2.2.0/31
   no shutdown
!
interface Ethernet3
   description to-leaf-3
   no switchport
   ip address 10.2.3.0/31
   no shutdown
